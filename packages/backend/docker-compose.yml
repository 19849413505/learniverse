version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: learniverse-db
    environment:
      POSTGRES_USER: learniverse
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: learniverse_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres-data:
